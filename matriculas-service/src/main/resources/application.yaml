server:
  port: 8084

spring:
  datasource:
    url: jdbc:h2:mem:matriculasservice;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  swagger-ui:
    path: /swagger-ui.html

auth-service:
  url: ${AUTH_SERVICE_URL:http://localhost:8081}

estudiantes-service:
  url: ${ESTUDIANTES_SERVICE_URL:http://localhost:8082}

cursos-service:
  url: ${CURSOS_SERVICE_URL:http://localhost:8083}

